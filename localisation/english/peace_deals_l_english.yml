 custom_peace_uncontrolled_take_states:0 "İşgal Edilmemiş Toprak"
 custom_peace_uncontrolled_take_states_desc:0 "Kuvvetlerimiz bu bölgeyi işgal etmiyor. Uğruna savaşmadığımız toprakları talep etmek çok daha fazla savaş puanına mal olur."
 custom_peace_uncontrolled_take_states_neighbor_state:0 "Cephemize Komşu Bölge"
 custom_peace_uncontrolled_take_states_neighbor_state_desc:0 "Bu bölge işgal edilmemiş olsa da kontrol ettiğimiz topraklara komşudur. Harekât alanımız içinde olduğu için maliyeti kısmen azalır."
 custom_peace_controlled_take_states:0 "İşgal Edilmiş Toprak"
 custom_peace_controlled_take_states_desc:0 "Kuvvetlerimiz şu anda bu bölgeyi kontrol ediyor, bu da müzakere masasında talep edilmesini önemli ölçüde ucuzlatır."
 custom_peace_uncontrolled_puppet:0 "İşgal Edilmemiş Toprak"
 custom_peace_uncontrolled_puppet_desc:0 "Burada askerî varlığımız bulunmuyor. Sahada güç bulundurmadan kukla bir hükûmet kurdurmak çok daha fazla savaş puanına mal olur."
 custom_peace_uncontrolled_liberate:0 "İşgal Edilmemiş Toprak"
 custom_peace_uncontrolled_liberate_desc:0 "Kuvvetlerimiz bu bölgeye hiç ulaşmadı. Ayak basmadığımız toprakları özgürleştirmek yüksek savaş puanı gerektirir."
 custom_peace_uncontrolled_force_government:0 "İşgal Edilmemiş Toprak"
 custom_peace_uncontrolled_force_government_desc:0 "Burada sahada herhangi bir üstünlüğümüz bulunmuyor. Askerî varlık olmadan hükûmet değişikliği dayatmak çok daha fazla savaş puanına mal olur."